    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        
        const SUPABASE_URL = "https://frjvyntbxlidmmktiggm.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZyanZ5bnRieGxpZG1ta3RpZ2dtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMDg3NTYsImV4cCI6MjA5MzU4NDc1Nn0.gyqmKNnQwQqYB54j8TIpb92QJI4Mbm5p6ZlUvuagIa4";
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let player = { name: "Sir Elandor", class: "Knight", avatar: "🛡️", level: 1, xp: 0, xpToNext: 100, gold: 250, energy: 100, maxEnergy: 100, hp: 100, maxHp: 100, stats: {strength:5,defense:5,speed:5,cunning:8}, inventory: [], kingdom_id: null };
        let uid = null;
        let currentKingdom = null;

        // ==================== INIT ====================
        async function init() {
            try {
                console.log("🚀 Starting Blackthorn...");
                const { data: { user } } = await supabase.auth.signInAnonymously();
                uid = user.id;
                console.log("✅ UID:", uid);

                // Try to load existing character
                const { data: p } = await supabase.from('players').select('*').eq('uid', uid).single();

                if (!p) {
                    console.log("No character found → showing creation modal");
                    showCreationModal();
                } else {
                    player = p;
                    console.log("✅ Loaded existing character");
                    finishLoadingGame();
                }
            } catch (err) {
                console.error("Init error:", err);
                showCreationModal(); // fallback
            }
        }

        function showCreationModal() {
            document.getElementById('creation-modal').classList.remove('hidden');
        }

        function hideCreationModal() {
            document.getElementById('creation-modal').classList.add('hidden');
        }

        // ==================== CREATE CHARACTER ====================
        async function createCharacter() {
            const nameInput = document.getElementById('char-name').value.trim();
            const selectedClass = document.querySelector('input[name="class"]:checked').value;
            const selectedAvatar = document.querySelector('input[name="avatar"]:checked').value;

            if (!nameInput) return alert("Your legend needs a name, adventurer!");

            player.name = nameInput;
            player.class = selectedClass;
            player.avatar = selectedAvatar;
            if (selectedClass === "Knight") player.gold = 300;

            if (!uid) return alert("Authentication error. Refresh and try again.");

            console.log("🔄 Saving character...");

            try {
                const { error } = await supabase.from('players').insert({
                    uid: uid,
                    name: player.name,
                    class: player.class,
                    avatar: player.avatar,
                    level: 1,
                    xp: 0,
                    xpToNext: 100,
                    gold: player.gold,
                    energy: 100,
                    maxEnergy: 100,
                    hp: 100,
                    maxHp: 100,
                    stats: player.stats,
                    inventory: player.inventory,
                    kingdom_id: null
                });

                if (error) throw error;

                console.log("✅ Character saved!");
                hideCreationModal();
                finishLoadingGame();

            } catch (err) {
                console.error("❌ Save failed:", err);
                alert("Error saving character:\n" + (err.message || JSON.stringify(err)));
                // TEMPORARY: still let you play
                hideCreationModal();
                finishLoadingGame();
            }
        }

        function finishLoadingGame() {
            setupRealtime();
            loadKingdomData();
            renderAll();
            startEnergyTimer();
        }

        // ==================== REALTIME & ENERGY ====================
        function setupRealtime() {
            supabase.channel('players').on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, (payload) => {
                if (payload.new && payload.new.uid === uid) {
                    player = payload.new;
                    renderAll();
                }
            }).subscribe();
        }

        function startEnergyTimer() {
            setInterval(() => {
                if (player.energy < player.maxEnergy) {
                    player.energy = Math.min(player.maxEnergy, player.energy + 5);
                    if (uid) supabase.from('players').update({ energy: player.energy }).eq('uid', uid);
                    renderEnergy();
                }
            }, 8000);
        }

        async function updatePlayer() {
            if (uid) await supabase.from('players').update(player).eq('uid', uid);
        }

        async function loadKingdomData() {
            if (!player.kingdom_id) return;
            const { data: k } = await supabase.from('kingdoms').select('*').eq('id', player.kingdom_id).single();
            currentKingdom = k;
            renderAll();
        }

        // ==================== GAME LOGIC (unchanged) ====================
        const crimes = [ /* ... same as before ... */ ];
        const shopItems = [ /* ... same as before ... */ ];

        function gainXP(amount) { /* ... same ... */ }
        function buyItem(item) { /* ... same ... */ }
        function renderAll() { /* ... same ... */ }
        function renderEnergy() { /* ... same ... */ }
        function renderHP() { /* ... same ... */ }
        function renderCrimes() { /* ... same ... */ }
        function renderShop() { /* ... same ... */ }
        function renderKingdomPanel() { /* ... same ... */ }
        function switchTab(n) { /* ... same ... */ }
        function editName() { /* ... same ... */ }
        async function createKingdom() { /* ... same ... */ }
        async function joinKingdom() { /* ... same ... */ }
        async function leaveKingdom() { /* ... same ... */ }
        async function sendKingdomChat() { /* ... same ... */ }

        // Make functions global for onclick
        window.performCrime = performCrime;
        window.buyItem = buyItem;
        window.createKingdom = createKingdom;
        window.joinKingdom = joinKingdom;
        window.leaveKingdom = leaveKingdom;
        window.sendKingdomChat = sendKingdomChat;
        window.switchTab = switchTab;
        window.editName = editName;
        window.createCharacter = createCharacter;

        window.onload = init;
    </script>
