<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackthorn • Medieval MMORPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        
        const SUPABASE_URL = "https://frjvyntbxlidmmktiggm.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZyanZ5bnRieGxpZG1ta3RpZ2dtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMDg3NTYsImV4cCI6MjA5MzU4NDc1Nn0.gyqmKNnQwQqYB54j8TIpb92QJI4Mbm5p6ZlUvuagIa4";
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let player = { name: "Sir Elandor", class: "Knight", avatar: "🛡️", level: 1, xp: 0, xpToNext: 100, gold: 250, energy: 100, maxEnergy: 100, hp: 100, maxHp: 100, stats: {strength:5,defense:5,speed:5,cunning:8}, inventory: [], kingdom_id: null };
        let uid = null;
        let currentKingdom = null;

        async function init() {
            try {
                console.log("🚀 Starting init...");
                const { data: { user } } = await supabase.auth.signInAnonymously();
                uid = user.id;
                console.log("✅ Got UID:", uid);

                const { data: p } = await supabase.from('players').select('*').eq('uid', uid).single();

                // TEMPORARY FORCE MODAL so you can test character creation
                // (remove "true ||" later once save works)
                if (true || !p || (p.name === "Sir Elandor" && p.class === "Knight")) {
                    console.log("Showing character creation modal");
                    showCreationModal();
                    return;
                }

                // Existing character found
                player = p;
                setupRealtime();
                loadKingdomData();
                renderAll();
                startEnergyTimer();
            } catch (err) {
                console.error("❌ Init failed:", err);
                alert("Init error - check console");
            }
        }

        function showCreationModal() {
            document.getElementById('creation-modal').classList.remove('hidden');
        }

        function hideCreationModal() {
            document.getElementById('creation-modal').classList.add('hidden');
        }

        async function createCharacter() {
            const nameInput = document.getElementById('char-name').value.trim();
            const selectedClass = document.querySelector('input[name="class"]:checked').value;
            const selectedAvatar = document.querySelector('input[name="avatar"]:checked').value;

            if (!nameInput) return alert("Your legend needs a name, adventurer!");

            player.name = nameInput;
            player.class = selectedClass;
            player.avatar = selectedAvatar;
            if (selectedClass === "Knight") player.gold = 300;

            // === FIXED SAVE TO SUPABASE ===
            if (!uid) {
                console.error("No uid found - auth failed");
                return alert("Authentication error. Refresh and try again.");
            }

            console.log("🔄 Saving character for uid:", uid);
            console.log("📦 Data being sent:", player);

            try {
                const { error } = await supabase.from('players').insert({
                    uid: uid,
                    name: player.name,
                    class: player.class,
                    avatar: player.avatar,
                    level: player.level || 1,
                    xp: player.xp || 0,
                    xpToNext: player.xpToNext || 100,
                    gold: player.gold,
                    energy: player.energy || 100,
                    maxEnergy: player.maxEnergy || 100,
                    hp: player.hp || 100,
                    maxHp: player.maxHp || 100,
                    stats: player.stats,
                    inventory: player.inventory,
                    kingdom_id: player.kingdom_id || null
                });

                if (error) throw error;

                console.log("✅ Character saved successfully!");

                hideCreationModal();
                
                // Now fully load the game
                setupRealtime();
                loadKingdomData();
                renderAll();
                startEnergyTimer();

            } catch (err) {
                console.error("❌ FULL Supabase error:", err);
                alert("Error saving character: " + (err.message || JSON.stringify(err)));
                return;
            }
        }

        function setupRealtime() {
            supabase.channel('players').on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, (payload) => {
                if (payload.new.uid === uid) {
                    player = payload.new;
                    renderAll();
                }
            }).subscribe();
        }

        function startEnergyTimer() {
            setInterval(() => {
                if (player.energy < player.maxEnergy) {
                    player.energy = Math.min(player.maxEnergy, player.energy + 5);
                    supabase.from('players').update({ energy: player.energy }).eq('uid', uid);
                    renderEnergy();
                }
            }, 8000);
        }

        async function updatePlayer() {
            await supabase.from('players').update(player).eq('uid', uid);
        }

        async function loadKingdomData() {
            if (!player.kingdom_id) return;
            const { data: k } = await supabase.from('kingdoms').select('*').eq('id', player.kingdom_id).single();
            currentKingdom = k;
            renderAll();
        }

        // ====================== GAME DATA & FUNCTIONS ======================
        const crimes = [
            {id:1,name:"Cutpurse in the Market",energyCost:12,baseSuccess:82,stat:"cunning",goldMin:18,goldMax:42,xp:8,emoji:"💰",desc:"Snatch coins from merchants"},
            {id:2,name:"Highway Robbery",energyCost:22,baseSuccess:65,stat:"speed",goldMin:45,goldMax:95,xp:15,emoji:"🏇",desc:"Ambush a noble's carriage"},
            {id:3,name:"Burglarize the Lord's Manor",energyCost:35,baseSuccess:48,stat:"cunning",goldMin:110,goldMax:220,xp:28,emoji:"🏰",desc:"Sneak past guards"},
            {id:4,name:"Poach the King's Stag",energyCost:18,baseSuccess:75,stat:"speed",goldMin:30,goldMax:65,xp:12,emoji:"🦌",desc:"Illegal hunt"},
            {id:5,name:"Raid a Smugglers' Camp",energyCost:30,baseSuccess:55,stat:"strength",goldMin:80,goldMax:160,xp:22,emoji:"🏕️",desc:"Take their goods by force"}
        ];
        
        const shopItems = [
            {id:1,name:"Iron Dagger",price:120,stat:"cunning",boost:3,emoji:"🗡️"},
            {id:2,name:"Studded Leather Jerkin",price:180,stat:"defense",boost:4,emoji:"🛡️"},
            {id:3,name:"Boots of Swiftness",price:150,stat:"speed",boost:3,emoji:"🥾"},
            {id:4,name:"Battle Axe",price:220,stat:"strength",boost:5,emoji:"🪓"}
        ];

        function performCrime(crime) {
            if (player.energy < crime.energyCost) return alert("Not enough energy!");
            player.energy -= crime.energyCost;
            const successChance = Math.min(95, crime.baseSuccess + player.stats[crime.stat] * 2);
            if (Math.random() * 100 < successChance) {
                const gold = Math.floor(crime.goldMin + Math.random() * (crime.goldMax - crime.goldMin));
                player.gold += gold;
                gainXP(crime.xp);
            } else {
                player.hp = Math.max(0, player.hp - 12);
            }
            updatePlayer();
            renderAll();
        }
        
        function gainXP(amount) {
            player.xp += amount;
            while (player.xp >= player.xpToNext) {
                player.level++;
                player.xp -= player.xpToNext;
                player.xpToNext = Math.floor(player.xpToNext * 1.4);
                player.maxEnergy += 8;
                player.maxHp += 15;
                player.hp = player.maxHp;
            }
            updatePlayer();
        }
        
        function buyItem(item) {
            if (player.gold < item.price) return alert("Not enough gold!");
            player.gold -= item.price;
            player.stats[item.stat] += item.boost;
            player.inventory.push(item);
            updatePlayer();
            renderAll();
        }
        
        function renderAll() {
            document.getElementById('player-name').innerHTML = `<span class="text-4xl mr-2">${player.avatar}</span> \( {player.name} <span class="text-xs text-amber-300">( \){player.class})</span>`;
            document.getElementById('kingdom-header').textContent = currentKingdom ? currentKingdom.name : 'No Kingdom';
            document.getElementById('gold-display').textContent = player.gold;
            renderEnergy();
            renderHP();
            renderCrimes();
            renderShop();
            renderKingdomPanel();
        }
        
        function renderEnergy() {
            const percent = Math.floor((player.energy / player.maxEnergy) * 100);
            document.getElementById('energy-bar').style.width = percent + '%';
            document.getElementById('energy-text').textContent = `\( {player.energy}/ \){player.maxEnergy}`;
        }
        
        function renderHP() {
            const percent = Math.floor((player.hp / player.maxHp) * 100);
            document.getElementById('hp-bar').style.width = percent + '%';
            document.getElementById('hp-text').textContent = `\( {player.hp}/ \){player.maxHp}`;
        }
        
        function renderCrimes() {
            const container = document.getElementById('crimes-list');
            container.innerHTML = crimes.map(c => {
                const success = Math.min(95, c.baseSuccess + player.stats[c.stat] * 2);
                return `<button onclick='performCrime(${JSON.stringify(c)})' class="w-full flex gap-4 bg-[#3f2a1e] hover:bg-[#4a3629] p-4 rounded-2xl text-left ${player.energy < c.energyCost ? 'opacity-40 pointer-events-none' : ''}">
                    <div class="text-4xl">${c.emoji}</div>
                    <div class="flex-1">
                        <div class="font-bold">${c.name}</div>
                        <div class="text-xs text-amber-200/70">${c.desc}</div>
                        <div class="flex justify-between mt-2 text-xs"><span class="text-emerald-400">⚡ ${c.energyCost}</span><span>Success \~ ${success}%</span><span>💰 \( {c.goldMin}- \){c.goldMax}</span></div>
                    </div>
                </button>`;
            }).join('');
        }
        
        function renderShop() {
            const container = document.getElementById('shop-list');
            container.innerHTML = shopItems.map(item => `
                <div onclick='buyItem(${JSON.stringify(item)})' class="bg-[#3f2a1e] rounded-2xl p-4 cursor-pointer hover:scale-105">
                    <div class="text-5xl">${item.emoji}</div>
                    <div class="font-bold mt-2">${item.name}</div>
                    <div class="text-xs text-amber-200/70">+${item.boost} ${item.stat} — ${item.price} gold</div>
                </div>
            `).join('');
        }
        
        function renderKingdomPanel() {
            const container = document.getElementById('kingdom-panel-content');
            if (!player.kingdom_id) {
                container.innerHTML = `<button onclick="createKingdom()" class="w-full py-6 bg-[#d4a017] text-[#3f2a1e] font-bold text-xl rounded-3xl mb-4">🏰 FOUND A NEW KINGDOM (500 gold)</button><button onclick="joinKingdom()" class="w-full py-6 border border-amber-300 text-amber-300 font-bold rounded-3xl">Join Existing Kingdom</button>`;
                return;
            }
            container.innerHTML = `<div class="bg-[#3f2a1e] rounded-3xl p-6"><div class="font-bold text-2xl">${currentKingdom.name}</div><button onclick="leaveKingdom()" class="mt-6 w-full py-3 text-red-400 border border-red-400/50 rounded-2xl">Leave Kingdom</button><div class="mt-8"><input id="kingdom-chat-input" placeholder="Message your kingdom..." class="w-full bg-[#1a1208] rounded-2xl px-4 py-3 text-white"><button onclick="sendKingdomChat()" class="mt-2 w-full bg-[#d4a017] text-[#3f2a1e] py-3 rounded-2xl">Send</button></div></div>`;
        }
        
        function switchTab(n) {
            document.querySelectorAll('#tab-content > div').forEach(d => d.classList.add('hidden'));
            document.getElementById('panel-' + n).classList.remove('hidden');
        }
        
        function editName() {
            const newName = prompt("Your new name?", player.name);
            if (newName && newName.trim()) {
                player.name = newName.trim();
                updatePlayer();
                renderAll();
            }
        }

        async function createKingdom() {
            if (player.gold < 500) return alert("500 gold required!");
            const name = prompt("Name your Kingdom:", "Kingdom of Ravens");
            if (!name) return;
            const { data, error } = await supabase.from('kingdoms').insert({ name: name.trim(), leader_uid: uid }).select().single();
            if (error) return alert("Name already taken!");
            player.kingdom_id = data.id;
            await supabase.from('kingdom_members').insert({ kingdom_id: data.id, player_uid: uid, role: 'leader' });
            await updatePlayer();
            currentKingdom = data;
            renderAll();
        }
        
        async function joinKingdom() {
            const name = prompt("Enter kingdom name to join:");
            if (!name) return;
            const { data: k } = await supabase.from('kingdoms').select('id').eq('name', name).single();
            if (!k) return alert("Kingdom not found!");
            await supabase.from('kingdom_members').insert({ kingdom_id: k.id, player_uid: uid, role: 'member' });
            player.kingdom_id = k.id;
            await updatePlayer();
            loadKingdomData();
        }
        
        async function leaveKingdom() {
            if (!confirm("Leave your kingdom?")) return;
            await supabase.from('kingdom_members').delete().eq('player_uid', uid);
            player.kingdom_id = null;
            currentKingdom = null;
            await updatePlayer();
            renderAll();
        }
        
        async function sendKingdomChat() {
            const input = document.getElementById('kingdom-chat-input');
            const text = input.value.trim();
            if (!text || !player.kingdom_id) return;
            await supabase.from('kingdom_chat').insert({ kingdom_id: player.kingdom_id, name: player.name, text });
            input.value = '';
        }

        // Make functions globally available for onclick handlers
        window.performCrime = performCrime;
        window.buyItem = buyItem;
        window.createKingdom = createKingdom;
        window.joinKingdom = joinKingdom;
        window.leaveKingdom = leaveKingdom;
        window.sendKingdomChat = sendKingdomChat;
        window.switchTab = switchTab;
        window.editName = editName;
        window.createCharacter = createCharacter;

        window.onload = init;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap');
        body { background: linear-gradient(180deg, #1a1208 0%, #2c1f14 100%); color: #f5d7a0; }
        .medieval-title { font-family: 'MedievalSharp', cursive; text-shadow: 3px 3px 0 #3f2a1e; }
        .game-container { max-width: 480px; margin: 0 auto; background: #1a1208; border: 8px solid #3f2a1e; box-shadow: 0 0 30px rgba(212,160,23,0.3); }
        .stat-bar { height: 12px; background: #3f2a1e; border: 2px solid #d4a017; border-radius: 9999px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.4s ease; }
        .modal { animation: modalPop 0.3s ease; }
        @keyframes modalPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="game-container w-full rounded-3xl overflow-hidden shadow-2xl">
        <div class="bg-[#3f2a1e] px-6 py-4 flex items-center justify-between border-b-4 border-[#d4a017]">
            <div>
                <h1 class="medieval-title text-3xl text-[#d4a017]">BLACKTHORN</h1>
                <p class="text-xs text-amber-200 -mt-1">Medieval MMORPG</p>
            </div>
            <div class="text-right">
                <div id="player-name" onclick="editName()" class="font-bold text-xl cursor-pointer flex items-center"></div>
                <div id="kingdom-header" class="text-emerald-400 text-sm">No Kingdom</div>
            </div>
            <div class="bg-emerald-600 text-white text-xs px-3 py-1 rounded-3xl flex items-center gap-1 font-bold">LIVE</div>
        </div>
        
        <div class="bg-[#2c1f14] px-6 py-3 flex justify-between text-sm border-b border-[#3f2a1e]">
            <div class="flex items-center gap-2 flex-1"><span class="text-emerald-400">⚡</span><div class="flex-1"><div class="stat-bar"><div id="energy-bar" class="bar-fill bg-emerald-400" style="width:100%"></div></div></div><span id="energy-text" class="font-mono">100/100</span></div>
            <div class="flex items-center gap-2 flex-1"><span class="text-red-400">❤️</span><div class="flex-1"><div class="stat-bar"><div id="hp-bar" class="bar-fill bg-red-400" style="width:100%"></div></div></div><span id="hp-text" class="font-mono">100/100</span></div>
            <div class="flex items-center gap-1"><span class="text-2xl">💰</span><span id="gold-display" class="font-bold text-xl">250</span></div>
        </div>
        
        <div class="flex border-b border-[#3f2a1e] bg-[#1a1208] text-xs overflow-x-auto">
            <button onclick="switchTab(0)" class="flex-1 py-4 font-bold border-b-4 border-[#d4a017] text-[#d4a017]">CRIMES</button>
            <button onclick="switchTab(1)" class="flex-1 py-4 font-bold">ARENA</button>
            <button onclick="switchTab(2)" class="flex-1 py-4 font-bold">TAVERN</button>
            <button onclick="switchTab(3)" class="flex-1 py-4 font-bold">MARKET</button>
            <button onclick="switchTab(4)" class="flex-1 py-4 font-bold">LEADERBOARD</button>
            <button onclick="switchTab(5)" class="flex-1 py-4 font-bold">KINGDOMS</button>
        </div>
        
        <div id="tab-content" class="p-6 min-h-[420px]">
            <div id="panel-0"><div id="crimes-list" class="space-y-3"></div></div>
            <div id="panel-1" class="hidden">Arena (PvP coming soon)</div>
            <div id="panel-2" class="hidden">Tavern — global realtime chat</div>
            <div id="panel-3" class="hidden"><div id="shop-list" class="grid grid-cols-2 gap-4"></div></div>
            <div id="panel-4" class="hidden">Hall of Legends</div>
            <div id="panel-5" class="hidden"><div id="kingdom-panel-content"></div></div>
        </div>
    </div>

    <!-- CHARACTER CREATION MODAL -->
    <div id="creation-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
        <div class="modal bg-[#2a1f14] border-4 border-[#d4af77] rounded-3xl max-w-md w-full p-8 shadow-2xl">
            <h1 class="medieval-title text-4xl text-center text-[#f5e8c7] mb-2">FORGE YOUR LEGEND</h1>
            <p class="text-center text-[#d4af77] mb-8">What shall the bards call you?</p>
            
            <input id="char-name" type="text" maxlength="20" placeholder="Sir Elandor" class="w-full bg-[#1f160f] border-2 border-[#d4af77] text-[#f5e8c7] text-2xl px-6 py-5 rounded-2xl mb-8 focus:outline-none focus:border-[#f5e8c7]">
            
            <div class="mb-8">
                <label class="block text-[#d4af77] text-sm mb-3 font-medium">CHOOSE YOUR CLASS</label>
                <div class="grid grid-cols-4 gap-3">
                    <label class="cursor-pointer"><input type="radio" name="class" value="Knight" checked class="hidden peer"><div class="peer-checked:border-[#f5e8c7] peer-checked:bg-[#3d2a1f] border-2 border-[#8c6f4e] rounded-2xl p-4 text-center hover:border-[#d4af77]">🛡️<br><span class="text-sm font-bold">Knight</span></div></label>
                    <label class="cursor-pointer"><input type="radio" name="class" value="Rogue" class="hidden peer"><div class="peer-checked:border-[#f5e8c7] peer-checked:bg-[#3d2a1f] border-2 border-[#8c6f4e] rounded-2xl p-4 text-center hover:border-[#d4af77]">🗡️<br><span class="text-sm font-bold">Rogue</span></div></label>
                    <label class="cursor-pointer"><input type="radio" name="class" value="Mage" class="hidden peer"><div class="peer-checked:border-[#f5e8c7] peer-checked:bg-[#3d2a1f] border-2 border-[#8c6f4e] rounded-2xl p-4 text-center hover:border-[#d4af77]">🔮<br><span class="text-sm font-bold">Mage</span></div></label>
                    <label class="cursor-pointer"><input type="radio" name="class" value="Archer" class="hidden peer"><div class="peer-checked:border-[#f5e8c7] peer-checked:bg-[#3d2a1f] border-2 border-[#8c6f4e] rounded-2xl p-4 text-center hover:border-[#d4af77]">🏹<br><span class="text-sm font-bold">Archer</span></div></label>
                </div>
            </div>
            
            <div class="mb-8">
                <label class="block text-[#d4af77] text-sm mb-3 font-medium">CHOOSE YOUR AVATAR</label>
                <div class="grid grid-cols-6 gap-3">
                    <label class="cursor-pointer"><input type="radio" name="avatar" value="🛡️" checked class="hidden peer"><div class="peer-checked:border-[#f5e8c7] peer-checked:bg-[#3d2a1f] border-2 border-[#8c6f4e] rounded-2xl aspect-square text-5xl flex items-center justify-center hover:border-[#d4af77]">🛡️</div></label>
                    <label class="cursor-pointer"><input type="radio" name="avatar" value="🗡️" class="hidden peer"><div class="peer-checked:border-[#f5e8c7] peer-checked:bg-[#3d2a1f] border-2 border-[#8c6f4e] rounded-2xl aspect-square text-5xl flex items-center justify-center hover:border-[#d4af77]">🗡️</div></label>
                    <label class="cursor-pointer"><input type="radio" name="avatar" value="🔮" class="hidden peer"><div class="peer-checked:border-[#f5e8c7] peer-checked:bg-[#3d2a1f] border-2 border-[#8c6f4e] rounded-2xl aspect-square text-5xl flex items-center justify-center hover:border-[#d4af77]">🔮</div></label>
                    <label class="cursor-pointer"><input type="radio" name="avatar" value="🏹" class="hidden peer"><div class="peer-checked:border-[#f5e8c7] peer-checked:bg-[#3d2a1f] border-2 border-[#8c6f4e] rounded-2xl aspect-square text-5xl flex items-center justify-center hover:border-[#d4af77]">🏹</div></label>
                    <label class="cursor-pointer"><input type="radio" name="avatar" value="🐺" class="hidden peer"><div class="peer-checked:border-[#f5e8c7] peer-checked:bg-[#3d2a1f] border-2 border-[#8c6f4e] rounded-2xl aspect-square text-5xl flex items-center justify-center hover:border-[#d4af77]">🐺</div></label>
                    <label class="cursor-pointer"><input type="radio" name="avatar" value="🪓" class="hidden peer"><div class="peer-checked:border-[#f5e8c7] peer-checked:bg-[#3d2a1f] border-2 border-[#8c6f4e] rounded-2xl aspect-square text-5xl flex items-center justify-center hover:border-[#d4af77]">🪓</div></label>
                </div>
            </div>
            
            <button onclick="createCharacter()" class="w-full bg-[#8c2f2f] hover:bg-[#a53a3a] text-white font-bold text-2xl py-6 rounded-2xl border-2 border-[#d4af77]">
                BEGIN YOUR ADVENTURE
            </button>
            
            <p class="text-center text-[#8c6f4e] text-xs mt-6">Your legend will be saved forever</p>
        </div>
    </div>
</body>
</html>
